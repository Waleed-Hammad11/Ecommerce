<nav class="navbar navbar-expand-lg sticky-top main-navbar">
  <div class="container">
    <a class="navbar-brand brand-gradient fw-bold fs-4" routerLink="/home">Purple Store</a>
    <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
      aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2 align-items-center">
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-pill transition-all text-light" routerLink="/home" routerLinkActive="activeClass">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-pill transition-all text-light" routerLink="/products" routerLinkActive="activeClass">Products</a>
        </li>

        @if (isLoggedIn) {
          <li class="nav-item">
            <a class="nav-link px-3 py-2 rounded-pill transition-all text-light" routerLink="/cart" routerLinkActive="activeClass">Cart</a>
          </li>
          @if (isAdmin) {
            <li class="nav-item">
              <a class="nav-link px-3 py-2 rounded-pill transition-all text-light text-gradient fw-bold" routerLink="/admin" routerLinkActive="activeClass">Admin</a>
            </li>
          }
        }

        @if (!isLoggedIn) {
          <li class="nav-item ms-lg-2">
            <a class="nav-link px-3 py-2 rounded-pill transition-all text-light" routerLink="/signup" routerLinkActive="activeClass">Signup</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-premium-primary rounded-pill px-4 py-2 text-decoration-none" routerLink="/login">Login</a>
          </li>
        } @else {
          <li class="nav-item ms-lg-2">
            <button class="btn btn-premium-secondary rounded-pill px-4 py-2" (click)="logout()">Logout</button>
          </li>
        }
      </ul>
    </div>
  </div>
